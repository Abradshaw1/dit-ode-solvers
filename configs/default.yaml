# ============================================================
# Default configuration for DiT + REPA + ODE Solver experiments
# ============================================================
# This file documents all settings used in the project.
# Pass individual arguments via CLI; this file is for reference.

# --- Model (DiT-S/2) ---
model:
  input_size: 32
  patch_size: 2
  in_channels: 3
  dim: 384
  depth: 12
  num_heads: 6
  num_classes: 10
  learn_sigma: false
  class_dropout_prob: 0.1

# --- REPA alignment ---
repa:
  enabled: true
  encoder_depth: 6          # extract DiT features at layer 6 (of 12)
  proj_coeff: 0.5           # weight for alignment loss
  encoder_size: s           # ViT size variant
  # per-checkpoint encoder config:
  encoders:
    encoder_a:              # checkpoints/encoder_a/
      encoder_type: clip
      z_dim: 768            # CLIP ViT-B/16 embed dim
    encoder_b:              # checkpoints/encoder_b/
      encoder_type: siglip
      z_dim: 768            # SigLIP ViT-B/16 embed dim

# --- Training ---
training:
  n_steps: 100000
  batch_size: 128
  lr: 1.0e-4
  optimizer: AdamW8bit
  weight_decay: 0.0
  mixed_precision: bfloat16
  ema_decay: 0.9999

# --- Sampling / ODE solvers ---
sampling:
  cfg_scale: 5.0
  use_ema: true
  solvers: [euler, heun, rk4]
  step_counts: [5, 10, 15, 25, 50, 100]

# --- FID evaluation ---
evaluation:
  num_fid_samples: 50000
  batch_size: 1024

# --- Data ---
data:
  dataset: cifar10
  root: ./data              # set to your CIFAR-10 path
